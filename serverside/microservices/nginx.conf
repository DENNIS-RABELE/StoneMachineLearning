worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream admin_portal {
        server 127.0.0.1:8006;
    }
    upstream decision_service {
        server 127.0.0.1:8000;
    }
    upstream unity_gameplay_service {
        server 127.0.0.1:8001;
    }
    upstream bettor_service {
        server 127.0.0.1:8002;
    }
    upstream bettor_analytics_service {
        server 127.0.0.1:8003;
    }
    upstream bettors_bet_data_service {
        server 127.0.0.1:8004;
    }
    upstream odds_generator_service {
        server 127.0.0.1:8005;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://admin_portal;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /admin/decision/ {
            proxy_pass http://decision_service/admin/;
            proxy_set_header X-Forwarded-Prefix /admin/decision;
            proxy_set_header Authorization "Bearer $cookie_admin_jwt";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect /admin/decision/login/ /admin/decision/admin/login/;
            proxy_redirect http://localhost/admin/decision/login/ /admin/decision/admin/login/;
            proxy_redirect http://127.0.0.1/admin/decision/login/ /admin/decision/admin/login/;
            proxy_redirect /admin/login/ /admin/decision/admin/login/;
            proxy_redirect /admin/ /admin/decision/admin/;
            proxy_redirect http://127.0.0.1:8000/admin/ /admin/decision/;
            proxy_redirect http://localhost/admin/ /admin/decision/;
        }

        location /admin/unity/ {
            proxy_pass http://unity_gameplay_service/admin/;
            proxy_set_header X-Forwarded-Prefix /admin/unity;
            proxy_set_header Authorization "Bearer $cookie_admin_jwt";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect /admin/unity/login/ /admin/unity/admin/login/;
            proxy_redirect http://localhost/admin/unity/login/ /admin/unity/admin/login/;
            proxy_redirect http://127.0.0.1/admin/unity/login/ /admin/unity/admin/login/;
            proxy_redirect /admin/login/ /admin/unity/admin/login/;
            proxy_redirect /admin/ /admin/unity/admin/;
            proxy_redirect http://127.0.0.1:8001/admin/ /admin/unity/;
            proxy_redirect http://localhost/admin/ /admin/unity/;
        }

        location /admin/bettor/ {
            proxy_pass http://bettor_service/admin/;
            proxy_set_header X-Forwarded-Prefix /admin/bettor;
            proxy_set_header Authorization "Bearer $cookie_admin_jwt";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect /admin/bettor/login/ /admin/bettor/admin/login/;
            proxy_redirect http://localhost/admin/bettor/login/ /admin/bettor/admin/login/;
            proxy_redirect http://127.0.0.1/admin/bettor/login/ /admin/bettor/admin/login/;
            proxy_redirect /admin/login/ /admin/bettor/admin/login/;
            proxy_redirect /admin/ /admin/bettor/admin/;
            proxy_redirect http://127.0.0.1:8002/admin/ /admin/bettor/;
            proxy_redirect http://localhost/admin/ /admin/bettor/;
        }

        location /admin/bettor-analytics/ {
            proxy_pass http://bettor_analytics_service/admin/;
            proxy_set_header X-Forwarded-Prefix /admin/bettor-analytics;
            proxy_set_header Authorization "Bearer $cookie_admin_jwt";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect /admin/bettor-analytics/login/ /admin/bettor-analytics/admin/login/;
            proxy_redirect http://localhost/admin/bettor-analytics/login/ /admin/bettor-analytics/admin/login/;
            proxy_redirect http://127.0.0.1/admin/bettor-analytics/login/ /admin/bettor-analytics/admin/login/;
            proxy_redirect /admin/login/ /admin/bettor-analytics/admin/login/;
            proxy_redirect /admin/ /admin/bettor-analytics/admin/;
            proxy_redirect http://127.0.0.1:8003/admin/ /admin/bettor-analytics/;
            proxy_redirect http://localhost/admin/ /admin/bettor-analytics/;
        }

    }
}
